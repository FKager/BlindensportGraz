name: iOS Build and Deploy

# Everything here runs through xcodebuild/security/xcrun on the command line —
# no Xcode GUI, no Transporter app, no Organizer. Two jobs:
#   build       - runs on every push/PR, unsigned build for the simulator, fast feedback.
#   deploy      - runs only on tags like "v1.0.0", signs a Release archive and
#                 uploads it to TestFlight/App Store Connect.
#
# Required repository secrets for the deploy job:
#   BUILD_CERTIFICATE_BASE64        base64 of your Distribution .p12  (base64 -i cert.p12 | pbcopy)
#   P12_PASSWORD                    password used when exporting the .p12
#   BUILD_PROVISION_PROFILE_BASE64  base64 of the .mobileprovision for it.a11y.BlindensportGraz
#   KEYCHAIN_PASSWORD               any random string, used only for the temporary CI keychain
#   APPSTORE_TEAM_ID                your 10-character Apple Developer Team ID
#   APP_STORE_CONNECT_KEY_ID        App Store Connect API key ID
#   APP_STORE_CONNECT_ISSUER_ID     App Store Connect API issuer ID
#   APP_STORE_CONNECT_API_KEY_BASE64  base64 of the AuthKey_<KEY_ID>.p8 file

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SCHEME: BlindensportGraz
  PROJECT: BlindensportGraz.xcodeproj
  BUNDLE_ID: it.a11y.BlindensportGraz

jobs:
  build:
    name: Build (unsigned, simulator)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        # macos-15 runners default /Applications/Xcode.app to Xcode 16.4,
        # which tops out at the iOS 18.5 SDK. This project's SwiftData
        # @Model class hierarchy (SportEvent/Training/Tournament) needs the
        # iOS 26 SDK's SwiftData macro to support class inheritance at all
        # (see .wolf/cerebrum.md's 2026-07-18 entry) — Xcode 16.4's older
        # macro expands a subclassed @Model into broken/duplicate code
        # ("redundant conformance...", "required initializer... must be
        # provided by subclass") instead of a clean compiler error, which is
        # what actually failed here. Pick the newest installed Xcode 26.x
        # dynamically rather than hardcoding a patch version, since GitHub
        # periodically changes which exact 26.x builds ship on this image.
        run: |
          set -euo pipefail
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "::error::No Xcode 26.x found on this runner (only found: $(ls -d /Applications/Xcode*.app 2>/dev/null | tr '\n' ' ')). This project's SwiftData @Model class hierarchy requires an iOS 26 SDK Xcode — see .wolf/cerebrum.md."
            exit 1
          fi
          echo "Selecting $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            | xcbeautify --renderer github-actions

  deploy:
    name: Archive, sign and upload to TestFlight
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        # See the identical step in the build job above for why this can't
        # just be /Applications/Xcode.app.
        run: |
          set -euo pipefail
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "::error::No Xcode 26.x found on this runner (only found: $(ls -d /Applications/Xcode*.app 2>/dev/null | tr '\n' ' ')). This project's SwiftData @Model class hierarchy requires an iOS 26 SDK Xcode — see .wolf/cerebrum.md."
            exit 1
          fi
          echo "Selecting $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install signing certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/"Provisioning Profiles"
          cp "$PP_PATH" ~/Library/MobileDevice/"Provisioning Profiles"

          PROFILE_UUID=$(security cms -D -i "$PP_PATH" | /usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin)
          PROFILE_NAME=$(security cms -D -i "$PP_PATH" | /usr/libexec/PlistBuddy -c "Print Name" /dev/stdin)
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Archive
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="${{ secrets.APPSTORE_TEAM_ID }}" \
            PROVISIONING_PROFILE="$PROFILE_UUID"

      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.APPSTORE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode \
            -o ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          IPA_PATH=$(find "$RUNNER_TEMP/export" -name "*.ipa" | head -n1)

          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
