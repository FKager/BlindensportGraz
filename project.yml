name: BlindensportGraz
options:
  bundleIdPrefix: it.a11y
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: de
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "5Q57Y9YT8J"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_PREVIEWS: "YES"
    ENABLE_DEBUG_DYLIB: "NO"
targets:
  BlindensportGraz:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BlindensportGraz
        excludes:
          - "Info.plist"
          - "BlindensportGraz.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: it.a11y.BlindensportGraz
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Blindensport Graz"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "5Q57Y9YT8J"
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGN_ENTITLEMENTS: BlindensportGraz/BlindensportGraz.entitlements
